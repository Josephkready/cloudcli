name: CI

# Quality gate for every pull request and every push to main. Until this
# landed, nothing in CI ran the tests or lint, so a regression could merge
# freely (#101). The suites gate on test / lint / type failures, emit LCOV
# coverage reports, and the "Coverage floor" step (issue #185) fails the build
# if any suite's line coverage drops below its per-suite floor
# (see scripts/check-coverage-floor.mjs — ratchet the floors up as coverage grows).
on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-progress run when the same ref is pushed again (e.g. a new commit
# on a PR branch) so CI always reflects the latest commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Server tests (with coverage)
        run: npm run test:server:coverage

      - name: Frontend unit tests (with coverage)
        run: npm run test:unit:coverage

      - name: Frontend component tests (with coverage)
        run: npm run test:component:coverage

      # Separate, tunable gate (issue #185): the steps above emit LCOV reports;
      # this fails the build if any suite's line coverage drops below its floor.
      # A red "Coverage floor" is distinguishable from a red test run above.
      - name: Coverage floor
        run: npm run coverage:floor
